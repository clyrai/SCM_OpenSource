name: Release to PyPI

on:
  push:
    tags:
      - "v*.*.*"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (must match pyproject.toml)"
        required: true

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi-release  # Use a protected env in GitHub for the secret

    permissions:
      # Required for PyPI's trusted publishing (no API token needed)
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build wheel + sdist
        run: |
          rm -rf dist build *.egg-info
          python -m build --wheel --sdist

      - name: Validate
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses PyPI's "trusted publishing" — configure once at
        # https://pypi.org/manage/account/publishing/ for the scm project.
        # No API token needed in the repo.

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create release notes from CHANGELOG
        id: notes
        run: |
          # Extract the section for this version from CHANGELOG.md
          VERSION="${GITHUB_REF_NAME#v}"
          awk "/^## v${VERSION}/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md > release_notes.md
          echo "Notes for v${VERSION}:"
          cat release_notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          draft: false
          prerelease: false
