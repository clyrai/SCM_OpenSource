# Fly.io deployment config for the SCM hosted demo.
#
# To deploy:
#   1. Install flyctl: https://fly.io/docs/hands-on/install-flyctl/
#   2. fly auth login
#   3. fly launch --no-deploy   (one-time; creates the app)
#   4. fly volumes create scm_data --size 1 --region sjc   (1GB persistent disk)
#   5. fly deploy
#
# After first deploy:
#   fly status        — check health
#   fly logs          — tail logs
#   fly ssh console   — shell in
#
# To upgrade to a stronger profile (Hybrid: DeepSeek extraction + local embedding):
#   fly secrets set DEEPSEEK_API_KEY=sk-...
#   fly secrets set LLM_PROVIDER=deepseek
#   fly deploy

app = "scm-demo"
primary_region = "sjc"  # San Jose; change to your nearest

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  SCM_DATA_DIR = "/data"
  SCM_EMBEDDING_BACKEND = "sentence_transformers"
  SCM_IDLE_THRESHOLD_SEC = "300"
  SCM_MCP_SWEEP_INTERVAL_SEC = "30"
  PYTHONUNBUFFERED = "1"

# Persistent volume for the SCM SQLite + downloaded models
[[mounts]]
  source = "scm_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"     # save money — stop when idle
  auto_start_machines = true      # restart on first request
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

# 1 vCPU + 1 GB RAM — fine for the demo profile.
# Bump shared_cpu_kind to "performance" + memory_mb to 2048 if running
# Profile B (Ollama embeddings) since the model load needs more headroom.
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

[[services]]
  protocol = "tcp"
  internal_port = 8000

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "get"
    path = "/v1/health"
    protocol = "http"
