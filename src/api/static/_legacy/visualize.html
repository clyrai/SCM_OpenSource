<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SleepAI - Memory Visualization</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            padding: 15px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .header .stats {
            font-size: 14px;
            opacity: 0.9;
        }

        .container {
            display: flex;
            height: calc(100vh - 60px);
        }

        #graph-container {
            flex: 1;
            position: relative;
        }

        #graph {
            width: 100%;
            height: 100%;
        }

        .sidebar {
            width: 300px;
            background: #16213e;
            padding: 20px;
            overflow-y: auto;
            border-left: 1px solid #333;
        }

        .sidebar h2 {
            font-size: 16px;
            margin-bottom: 15px;
            color: #667eea;
        }

        .node-details {
            background: #0f3460;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .node-details h3 {
            font-size: 14px;
            margin-bottom: 10px;
            color: #fff;
        }

        .node-details .field {
            margin-bottom: 8px;
            font-size: 13px;
        }

        .node-details .field .label {
            color: #888;
            display: inline-block;
            width: 100px;
        }

        .node-details .field .value {
            color: #fff;
        }

        .legend {
            margin-top: 20px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .controls {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }

        .controls button {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.2s;
        }

        .controls button:hover {
            opacity: 0.9;
        }

        .tooltip {
            position: absolute;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            border-radius: 6px;
            font-size: 12px;
            pointer-events: none;
            z-index: 1000;
            display: none;
            max-width: 250px;
        }

        .back-link {
            color: white;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.8;
        }

        .back-link:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="back-link">← Back to Chat</a>
        <h1>🧠 SleepAI Memory Graph</h1>
        <div class="stats" id="headerStats">Loading...</div>
    </div>

    <div class="container">
        <div id="graph-container">
            <svg id="graph"></svg>
            <div class="tooltip" id="tooltip"></div>
        </div>

        <div class="sidebar">
            <h2>Node Details</h2>
            <div class="node-details" id="nodeDetails">
                <p style="color: #888; font-size: 13px;">Click on a node to see details</p>
            </div>

            <h2>Legend</h2>
            <div class="legend" id="legend"></div>

            <div class="controls">
                <button onclick="refreshGraph()">🔄 Refresh Graph</button>
                <button onclick="resetZoom()">🔍 Reset Zoom</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let simulation;
        let svg, g, zoom;
        let currentSession = 'default';

        // Color scheme for concept types
        const colorMap = {
            'person': '#e74c3c',
            'preference': '#9b59b6',
            'fact': '#3498db',
            'event': '#f39c12',
            'location': '#2ecc71',
            'object': '#e67e22',
            'abstract': '#1abc9c',
            'relation': '#95a5a6'
        };

        const typeLabels = {
            'person': 'Person',
            'preference': 'Preference',
            'fact': 'Fact',
            'event': 'Event',
            'location': 'Location',
            'object': 'Object',
            'abstract': 'Abstract',
            'relation': 'Relation'
        };

        // Initialize
        async function init() {
            setupLegend();
            setupSvg();
            await loadAndRender();
        }

        function setupLegend() {
            const legend = document.getElementById('legend');
            legend.innerHTML = '';
            
            for (const [type, color] of Object.entries(colorMap)) {
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = `
                    <div class="legend-color" style="background: ${color}"></div>
                    <span>${typeLabels[type] || type}</span>
                `;
                legend.appendChild(item);
            }
        }

        function setupSvg() {
            const container = document.getElementById('graph-container');
            const width = container.clientWidth;
            const height = container.clientHeight;

            svg = d3.select('#graph')
                .attr('width', width)
                .attr('height', height);

            g = svg.append('g');

            zoom = d3.zoom()
                .scaleExtent([0.1, 4])
                .on('zoom', (event) => {
                    g.attr('transform', event.transform);
                });

            svg.call(zoom);
        }

        async function loadAndRender() {
            try {
                const response = await fetch(`${API_BASE}/chat/visualize/${currentSession}`);
                const data = await response.json();
                
                document.getElementById('headerStats').textContent = 
                    `${data.stats.total_nodes} concepts | ${data.stats.total_edges} relations`;
                
                renderGraph(data.nodes, data.edges);
            } catch (error) {
                console.error('Failed to load graph:', error);
                document.getElementById('headerStats').textContent = 'Error loading graph';
            }
        }

        function renderGraph(nodes, edges) {
            // Clear existing
            g.selectAll('*').remove();

            if (nodes.length === 0) {
                g.append('text')
                    .attr('x', svg.attr('width') / 2)
                    .attr('y', svg.attr('height') / 2)
                    .attr('text-anchor', 'middle')
                    .attr('fill', '#888')
                    .text('No memories yet. Start chatting!');
                return;
            }

            const width = +svg.attr('width');
            const height = +svg.attr('height');

            // Create force simulation
            simulation = d3.forceSimulation(nodes)
                .force('link', d3.forceLink(edges).id(d => d.id).distance(100))
                .force('charge', d3.forceManyBody().strength(-300))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(d => getNodeRadius(d) + 5));

            // Draw edges
            const link = g.append('g')
                .selectAll('line')
                .data(edges)
                .enter().append('line')
                .attr('stroke', '#555')
                .attr('stroke-width', d => (d.strength || 0.5) * 3)
                .attr('stroke-opacity', 0.6);

            // Draw nodes
            const node = g.append('g')
                .selectAll('g')
                .data(nodes)
                .enter().append('g')
                .attr('class', 'node')
                .call(d3.drag()
                    .on('start', dragstarted)
                    .on('drag', dragged)
                    .on('end', dragended));

            // Node circles
            node.append('circle')
                .attr('r', d => getNodeRadius(d))
                .attr('fill', d => colorMap[d.type] || '#95a5a6')
                .attr('stroke', '#fff')
                .attr('stroke-width', 2)
                .style('cursor', 'pointer')
                .on('click', (event, d) => showNodeDetails(d))
                .on('mouseover', (event, d) => showTooltip(event, d))
                .on('mouseout', hideTooltip);

            // Node labels
            node.append('text')
                .text(d => d.label)
                .attr('x', d => getNodeRadius(d) + 5)
                .attr('y', 4)
                .attr('fill', '#ddd')
                .attr('font-size', '11px')
                .style('pointer-events', 'none');

            // Update positions on tick
            simulation.on('tick', () => {
                link
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);

                node.attr('transform', d => `translate(${d.x},${d.y})`);
            });
        }

        function getNodeRadius(node) {
            const baseRadius = 8;
            const importanceBoost = (node.importance || 0.5) * 15;
            return baseRadius + importanceBoost;
        }

        function showNodeDetails(node) {
            const details = document.getElementById('nodeDetails');
            details.innerHTML = `
                <h3>${node.full_description || node.label}</h3>
                <div class="field">
                    <span class="label">Type:</span>
                    <span class="value">${typeLabels[node.type] || node.type}</span>
                </div>
                <div class="field">
                    <span class="label">Importance:</span>
                    <span class="value">${(node.importance || 0).toFixed(3)}</span>
                </div>
                <div class="field">
                    <span class="label">Strength:</span>
                    <span class="value">${(node.strength || 0).toFixed(2)}</span>
                </div>
                <div class="field">
                    <span class="label">Access Count:</span>
                    <span class="value">${node.access_count || 0}</span>
                </div>
                <div class="field">
                    <span class="label">ID:</span>
                    <span class="value" style="font-size: 11px; color: #888;">${node.id}</span>
                </div>
            `;
        }

        function showTooltip(event, node) {
            const tooltip = document.getElementById('tooltip');
            tooltip.innerHTML = `
                <strong>${node.label}</strong><br>
                Type: ${typeLabels[node.type] || node.type}<br>
                Importance: ${(node.importance || 0).toFixed(2)}
            `;
            tooltip.style.display = 'block';
            tooltip.style.left = (event.pageX + 10) + 'px';
            tooltip.style.top = (event.pageY - 10) + 'px';
        }

        function hideTooltip() {
            document.getElementById('tooltip').style.display = 'none';
        }

        function refreshGraph() {
            loadAndRender();
        }

        function resetZoom() {
            svg.transition().duration(750).call(
                zoom.transform,
                d3.zoomIdentity
            );
        }

        // Drag functions
        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }

        // Auto-refresh every 5 seconds
        setInterval(refreshGraph, 5000);

        // Initialize
        init();

        // Handle window resize
        window.addEventListener('resize', () => {
            const container = document.getElementById('graph-container');
            svg.attr('width', container.clientWidth);
            svg.attr('height', container.clientHeight);
            loadAndRender();
        });
    </script>
</body>
</html>
